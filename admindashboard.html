// Queries to count applications
$total_sql = "SELECT COUNT(*) AS total FROM applications";

$selected_sql = "SELECT COUNT(*) AS total FROM applications WHERE status='selected'";
$rejected_sql = "SELECT COUNT(*) AS total FROM applications WHERE status='rejected'";

$total_count = mysqli_fetch_assoc(mysqli_query($conn, $total_sql))['total'];
