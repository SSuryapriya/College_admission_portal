<!DOCTYPE html>
<html>
<head>
  <title>Admission Form</title>
</head>
<body>

  <h2>College Admission Form</h2>

  <form action="submit.php" method="POST">
    <!-- Name -->
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <!-- 12th Mark -->
    <label for="mark">12th Mark:</label>
    <input type="number" id="mark" name="mark" required><br><br>

    <!-- 1st Preference -->
    <label for="pref1">1st Preference:</label>
    <select id="pref1" name="pref1" required>
      <option value="">-- Select Course --</option>
      <option value="B.Com">B.Com</option>
      <option value="BBA">BBA</option>
      <option value="BA">BA</option>
    </select><br><br>

    <!-- 2nd Preference -->
    <label for="pref2">2nd Preference:</label>
    <select id="pref2" name="pref2" required>
      <option value="">-- Select Course --</option>
      <option value="B.Com">B.Com</option>
      <option value="BBA">BBA</option>
      <option value="BA">BA</option>
    </select><br><br>
<form action="submit.php" method="POST" enctype="multipart/form-data">
  <!-- Existing personal details fields -->
  <input type="text" name="school_name" placeholder="School Name" required />
  <input type="number" name="year_of_passing" placeholder="Year of Passing" required />
  <input type="text" name="twelfth_mark" placeholder="12th Mark (%)" required />
  <input type="text" name="medium" placeholder="Medium of Study" required />

  <!-- Upload Files -->
  <label>Upload Marksheet:</label>
  <input type="file" name="marksheet" accept=".pdf,.jpg,.png" required />
  <label>Upload TC:</label>
  <input type="file" name="tc" accept=".pdf,.jpg,.png" required />
  <label>Upload Aadhar:</label>
  <input type="file" name="aadhar" accept=".pdf,.jpg,.png" required />

  <button type="submit">Submit</button>
</form>

    <!-- Submit Button -->
    <button type="submit">Submit</button>
  </form>

</body>
</html>
